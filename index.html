  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultor de Garantía Extendida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 960px; margin: 0 auto; }

    header { background: #ffffff; border-radius: 12px; padding: 1.25rem 1.75rem; margin-bottom: 1.5rem; text-align: center; border: 1px solid #e2e5ec; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    header .logo-img { height: 70px; margin-bottom: 10px; }
    header .titulo { font-size: 18px; font-weight: 800; color: #f5a623; letter-spacing: 2px; text-transform: uppercase; }
    header .subtitle { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    .card { background: #fff; border-radius: 12px; border: 1px solid #e2e5ec; padding: 1.4rem; margin-bottom: 1.25rem; }
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
    .field { display: flex; flex-direction: column; gap: 5px; align-items: center; }
    .field label { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
    .field-cat { flex: 2; min-width: 200px; }
    .field-price { flex: 1; min-width: 150px; }
    select { display: none; } /* hidden, replaced by custom dropdown */
    input[type="number"] { height: 40px; padding: 0 12px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; color: #1a1a2e; background: #fff; width: 100%; outline: none; transition: border-color 0.15s; text-align: center; }
    input[type="number"]:focus { border-color: #0a2d6e; }
    button { height: 40px; padding: 0 1.4rem; background: #0a2d6e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap; }
    button:hover { background: #0d3a8a; }
    button:active { transform: scale(0.98); }

    /* Custom dropdown */
    .custom-select { position: relative; width: 100%; }
    .custom-select-trigger { height: 40px; padding: 0 36px 0 12px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; color: #1a1a2e; background: #fff; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; position: relative; user-select: none; }
    .custom-select-trigger:hover, .custom-select-trigger.open { border-color: #0a2d6e; }
    .custom-select-trigger .cs-arrow { position: absolute; right: 12px; font-size: 10px; color: #9ca3af; transition: transform 0.2s; }
    .custom-select-trigger.open .cs-arrow { transform: rotate(180deg); }
    .custom-select-trigger .cs-val { font-size: 14px; color: #1a1a2e; }
    .custom-select-trigger .cs-placeholder { font-size: 13px; color: #9ca3af; }

    .custom-dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1.5px solid #0a2d6e; border-radius: 10px; z-index: 200; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .custom-dropdown.open { display: block; }
    .custom-dropdown-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; font-size: 13px; color: #1a1a2e; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid #f0f1f3; gap: 8px; }
    .custom-dropdown-item:last-child { border-bottom: none; }
    .custom-dropdown-item:hover { background: #f0f4ff; }
    .custom-dropdown-item.selected { background: #eff6ff; font-weight: 700; color: #0a2d6e; }
    .custom-dropdown-item.fav-top { background: #fffbeb; }
    .custom-dropdown-item .cs-item-name { flex: 1; }
    .cs-star { font-size: 16px; color: #d1d5db; cursor: pointer; padding: 2px 4px; transition: color 0.15s, transform 0.1s; flex-shrink: 0; }
    .cs-star:hover { transform: scale(1.3); }
    .cs-star.active { color: #f5a623; }

    .results-header { font-size: 13px; color: #6b7280; margin-bottom: 1.1rem; padding-bottom: 10px; border-bottom: 1px solid #e5e7eb; }
    .results-header strong { color: #1a1a2e; font-weight: 600; }

    .tipo-section { margin-bottom: 1.2rem; }
    .tipo-section:last-child { margin-bottom: 0; }
    .tipo-sep { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .tipo-sep-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 2px 10px; border-radius: 20px; white-space: nowrap; }
    .tipo-sep-line { flex: 1; height: 1px; background: #e5e7eb; }
    .sep-reparacion { background: #dbeafe; color: #1d4ed8; }
    .sep-reemplazo  { background: #dcfce7; color: #15803d; }
    .sep-dano       { background: #fef3c7; color: #92400e; }

    /* Plan counter badge */
    .plan-count { font-size: 10px; color: #9ca3af; font-weight: 500; margin-left: 6px; }

    .plans-grid { display: flex; flex-direction: column; gap: 6px; }

    /* Accordion card wrapper */
    .plan-wrap { border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; }
    .plan-wrap.border-reparacion { border: 1.5px solid #93c5fd; }
    .plan-wrap.border-reemplazo  { border: 1.5px solid #86efac; }
    .plan-wrap.border-dano       { border: 1.5px solid #fcd34d; }

    /* Left accent bar */
    .plan-wrap::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 10px 0 0 10px; }
    .plan-wrap.border-reparacion::before { background: #3b82f6; }
    .plan-wrap.border-reemplazo::before  { background: #22c55e; }
    .plan-wrap.border-dano::before       { background: #f59e0b; }

    /* Horizontal card row */
    .plan-card { background: #fff; padding: 0.6rem 1rem 0.6rem 1.2rem; display: flex; align-items: center; gap: 10px; min-height: 54px; user-select: none; transition: opacity 0.1s, transform 0.1s; }
    .plan-card:active { opacity: 0.75; transform: scale(0.99); }

    /* Chevron indicator */
    .plan-chevron { font-size: 11px; color: #9ca3af; transition: transform 0.2s; flex-shrink: 0; }
    .plan-wrap.open .plan-chevron { transform: rotate(180deg); }

    /* Info */
    .plan-info { flex: 1; min-width: 0; }
    .plan-title { font-size: 12px; font-weight: 700; color: #0a2d6e; text-transform: uppercase; letter-spacing: 0.3px; flex: 1; }
    .plan-prices { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 8px; }
    .eg-price-h { font-size: 11px; font-weight: 700; color: #0a2d6e; white-space: nowrap; }
    /* Total highlighted */
    .total-h { font-size: 14px; font-weight: 800; color: #7c3aed; white-space: nowrap; flex-shrink: 0; background: #f5f3ff; padding: 2px 8px; border-radius: 6px; }
    .tasa-badge { font-size: 10px; font-weight: 700; background: #fde68a; color: #1a1a2e; border-radius: 6px; padding: 2px 6px; margin-left: 4px; }
    .disc-inline { font-size: 8px; color: #16a34a; font-weight: 600; white-space: nowrap; margin-left: auto; }
    .plan-cupon { font-size: 9px; color: #a78bfa; font-weight: 600; margin-top: 3px; }

    .version-footer { text-align: center; padding: 1.5rem 0 2rem; font-size: 11px; color: #d1d5db; }

    .plan-expand { background: #f8f9ff; max-height: 0; overflow: hidden; transition: max-height 0.22s ease, padding 0.22s ease; display: flex; gap: 4px; padding: 0 1rem; align-items: center; justify-content: flex-end; }
    .plan-wrap.open .plan-expand { max-height: 32px; padding: 5px 1rem; }

    /* Two buttons in expand row */
    .btn-vender, .btn-detalle { font-size: 9px; font-weight: 700; cursor: pointer; white-space: nowrap; border-radius: 4px; background: transparent; display: inline-flex; align-items: center; justify-content: center; padding: 3px 10px; height: 22px; box-sizing: border-box; }
    .btn-vender  { color: #7c3aed; border: 1.5px solid #7c3aed; }
    .btn-vender:hover  { background: rgba(124,58,237,0.06); }
    .btn-detalle { color: #0a2d6e; border: 1.5px solid #0a2d6e; }
    .btn-detalle:hover { background: rgba(10,45,110,0.05); }

    /* Unified modal */
    .detalle-modal { background: #fff; border-radius: 16px; padding: 1.4rem; width: 90%; max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .detalle-title { font-size: 13px; font-weight: 700; color: #0a2d6e; text-align: center; text-transform: uppercase; margin-bottom: 0.9rem; }
    .detalle-resumen { background: #f8f9ff; border-radius: 8px; padding: 0.6rem 0.8rem; margin-bottom: 0.8rem; }
    .detalle-resumen-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; }
    .detalle-resumen-lbl { color: #6b7280; }
    .detalle-resumen-val { font-weight: 600; color: #1a1a2e; }
    .detalle-total { font-size: 18px; font-weight: 800; color: #7c3aed; text-align: center; margin-bottom: 0.9rem; }
    .detalle-cuotas-title { font-size: 10px; font-weight: 700; color: #0a2d6e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; text-align: center; }
    .detalle-cuota-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f0f1f3; }
    .detalle-cuota-row:last-of-type { border-bottom: none; }
    .detalle-cuota-lbl { font-size: 12px; color: #6b7280; }
    .detalle-cuota-val { font-size: 14px; font-weight: 700; color: #c8102e; }
    .detalle-btn { margin-top: 1rem; width: 100%; height: 40px; background: #0a2d6e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }

    /* Barcode modal */
    .bc-modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); text-align: center; }
    .bc-modal-title { font-size: 15px; font-weight: 700; color: #7c3aed; white-space: nowrap; margin-bottom: 1.2rem; text-align: center; }
    .bc-section { margin-bottom: 2.4rem; }
    .bc-section:last-of-type { margin-bottom: 0; }
    .bc-subtitle { font-size: 12px; font-weight: 700; color: #0a2d6e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .bc-svg { width: 100%; max-width: 260px; }
    .bc-modal-btn { margin-top: 1.2rem; width: 100%; height: 42px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .bc-modal-btn:hover { background: #6d28d9; }

    .error-msg { font-size: 13px; color: #dc2626; padding: 10px 0; }

    .dismiss-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #f3f4f6; border-top: 1px solid #e5e7eb; padding: 8px 16px; z-index: 50; justify-content: flex-end; }
    .dismiss-bar.show { display: flex; }
    .dismiss-btn { background: #0a2d6e; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; padding: 6px 18px; cursor: pointer; }

    /* Modal backdrop */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }

    @media (max-width: 520px) {
      body { padding: 1rem 0.75rem; }
      header { padding: 1rem 1.1rem; }
      header .logo-img { height: 55px; }
      .plans-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
      button { width: 100%; }
    }
  </style>

const tipoSepClass   = {"Reparación":"sep-reparacion","Reemplazo":"sep-reemplazo","Daño Accidental":"sep-dano"};
const tipoBorderClass = {"Reparación":"border-reparacion","Reemplazo":"border-reemplazo","Daño Accidental":"border-dano"};

const s = v => 'S/ ' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const p = v => (v*100 % 1 === 0 ? (v*100).toFixed(0) : (v*100).toFixed(1)) + '%';

function calcular() {
  const key = document.getElementById('customSelect').dataset.value || '';
  const precio = parseFloat(document.getElementById('precio').value);
  const res = document.getElementById('resultados');
  if (!key) { res.innerHTML = '<p class="error-msg">⚠️ Selecciona una categoría.</p>'; return; }
  if (isNaN(precio)||precio<=0) { res.innerHTML = '<p class="error-msg">⚠️ Ingresa un precio válido.</p>'; return; }

  const cat = cats[key];
  let html = `<div class="card">
    <div class="results-header">
      Producto: <strong>${s(precio)}</strong> &nbsp;·&nbsp; Categoría: <strong>${cat.n}</strong>
    </div>`;

  for (const grupo of cat.grupos) {
    const sepCls    = tipoSepClass[grupo.tipo]    || 'sep-reemplazo';
    const borderCls = tipoBorderClass[grupo.tipo] || 'border-reemplazo';

    html += `<div class="tipo-section">
      <div class="tipo-sep">
        <span class="tipo-sep-label ${sepCls}">Plan ${grupo.tipo}</span>
        <span class="plan-count">${grupo.planes.length} plan${grupo.planes.length > 1 ? 'es' : ''}</span>
        <div class="tipo-sep-line"></div>
      </div>
      <div class="plans-grid">`;

    for (const plan of grupo.planes) {
      let eg = precio * plan.t;
      const capped = plan.maxEG && eg > plan.maxEG;
      if (capped) eg = plan.maxEG;
      const cuponAplica = plan.d > 0 && (!plan.minCupon || precio > plan.minCupon);
      const descMonto = cuponAplica ? precio * plan.d : 0;
      const total = (precio - descMonto) + eg;
      const cuota3  = total * 0.3699;
      const cuota6  = total * 0.1995;
      const cuota10 = total * 0.1320;
      const cuota12 = total * 0.1000;
      const cuota18 = total * 0.0882;
      const hasDisc = cuponAplica;

      const planTitle = `EG ${cat.n} ${plan.l}`.toUpperCase();
      const widgetLabel = plan.l.toUpperCase();
      const bcData = plan.bc ? JSON.stringify(plan.bc).replace(/"/g,'&quot;') : '';
      const detalleData = `openDetalleModal('${planTitle}',${precio},${eg},${plan.t},${descMonto},${total},${cuota3},${cuota6},${cuota10},${cuota12},${cuota18})`;

      html += `<div class="plan-wrap ${borderCls}" onclick="toggleCard(this)">
        <div class="plan-card">
          <div class="plan-info">
            
            <div class="plan-prices">
              <span class="plan-title">${widgetLabel}</span>
              <span class="total-h">Total: ${s(total)}</span>
            </div>
            ${hasDisc ? `<div class="plan-cupon">Incluye cupón ${p(plan.d)} dcto · ${s(descMonto)}</div>` : ''}
          </div>
          <span class="plan-chevron">▼</span>
        </div>
        <div class="plan-expand" onclick="event.stopPropagation()">
          <button class="btn-detalle" onclick="${detalleData}">Ver detalle</button>
          ${plan.bc ? `<button class="btn-vender" onclick="openBcModal('${bcData}')">Seleccionar</button>` : ''}
        </div>
      </div>`;
    }

    html += `</div></div>`;
  }

  html += '</div>';
  res.innerHTML = html;
}

function openVmasModal(nombre, precio, eg, tasa, desc, total) {
  const fmt = v => 'S/ ' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const pct = v => (v*100 % 1 === 0 ? (v*100).toFixed(0) : (v*100).toFixed(1)) + '%';
  document.getElementById('vmasTitle').textContent   = nombre;
  document.getElementById('vmasPrecio').textContent  = fmt(precio);
  document.getElementById('vmasEg').textContent      = fmt(eg);
  document.getElementById('vmasTasa').textContent    = pct(tasa);
  document.getElementById('vmasTotal').textContent   = fmt(total);
  const descRow = document.getElementById('vmasDescRow');
  if (desc > 0) {
    document.getElementById('vmasDesc').textContent = '− ' + fmt(desc);
    descRow.style.display = 'flex';
  } else {
    descRow.style.display = 'none';
  }
  document.getElementById('vmasBackdrop').classList.add('open');
}

function closeVmasModal(e) {
  if (!e || e.target === document.getElementById('vmasBackdrop'))
    document.getElementById('vmasBackdrop').classList.remove('open');
}

function toggleCard(el) {
  const isOpen = el.classList.contains('open');
  // Close all open cards first
  document.querySelectorAll('.plan-wrap.open').forEach(w => w.classList.remove('open'));
  // If it wasn't open, open it
  if (!isOpen) el.classList.add('open');
}

// --- Custom dropdown with favorites ---
const FAV_KEY  = 'eg_fav_cat';
const LAST_KEY = 'eg_last_cat';

const CAT_OPTIONS = [
  { value:'telefonia',        label:'Telefonía Móvil' },
  { value:'audio',            label:'Audio' },
  { value:'tv',               label:'TV Video' },
  { value:'computo',          label:'Cómputo' },
  { value:'lineablanca',      label:'Línea Blanca' },
  { value:'electro',          label:'Electrodomésticos' },
  { value:'cuidado',          label:'Cuidado Personal' },
  { value:'electronicamenor', label:'Electrónica Menor' },
  { value:'consolas',         label:'Videojuegos / Consolas' },
];

function buildDropdown() {
  const fav = localStorage.getItem(FAV_KEY);
  const sel = document.getElementById('customSelect').dataset.value || '';
  const dropdown = document.getElementById('csDropdown');

  // Sort: fav first, rest alphabetically
  const sorted = [...CAT_OPTIONS].sort((a, b) => {
    if (a.value === fav) return -1;
    if (b.value === fav) return 1;
    return 0;
  });

  dropdown.innerHTML = sorted.map(opt => `
    <div class="custom-dropdown-item ${opt.value === sel ? 'selected' : ''} ${opt.value === fav ? 'fav-top' : ''}"
         onclick="selectCat('${opt.value}','${opt.label}')">
      <span class="cs-item-name">${opt.value === fav ? '★ ' : ''}${opt.label}</span>
      <span class="cs-star ${opt.value === fav ? 'active' : ''}"
            onclick="event.stopPropagation(); toggleFav('${opt.value}')"
            title="${opt.value === fav ? 'Quitar favorita' : 'Fijar como favorita'}">
        ${opt.value === fav ? '★' : '☆'}
      </span>
    </div>`).join('');
}

function toggleDropdown() {
  const trigger  = document.getElementById('csTrigger');
  const dropdown = document.getElementById('csDropdown');
  const isOpen   = dropdown.classList.contains('open');
  if (isOpen) { closeDropdown(); return; }
  buildDropdown();
  trigger.classList.add('open');
  dropdown.classList.add('open');
}

function closeDropdown() {
  document.getElementById('csTrigger').classList.remove('open');
  document.getElementById('csDropdown').classList.remove('open');
}

function selectCat(value, label) {
  document.getElementById('customSelect').dataset.value = value;
  const display = document.getElementById('csDisplay');
  display.textContent = label;
  display.className = 'cs-val';
  localStorage.setItem(LAST_KEY, value);
  closeDropdown();
  autoCalc();
}

function toggleFav(value) {
  const current = localStorage.getItem(FAV_KEY);
  if (current === value) localStorage.removeItem(FAV_KEY);
  else localStorage.setItem(FAV_KEY, value);
  buildDropdown();
}

function loadCatPreference() {
  const fav  = localStorage.getItem(FAV_KEY);
  const last = localStorage.getItem(LAST_KEY);
  const load = fav || last;
  if (load) {
    const opt = CAT_OPTIONS.find(o => o.value === load);
    if (opt) {
      document.getElementById('customSelect').dataset.value = load;
      const display = document.getElementById('csDisplay');
      display.textContent = opt.label;
      display.className = 'cs-val';
      autoCalc();
    }
  }
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('customSelect').contains(e.target)) closeDropdown();
});

function dismissKeyboard() {
  document.getElementById('precio').blur();
  document.getElementById('dismissBar').classList.remove('show');
}

document.getElementById('precio').addEventListener('focus', () => {
  document.getElementById('dismissBar').classList.add('show');
});
document.getElementById('precio').addEventListener('blur', () => {
  setTimeout(() => document.getElementById('dismissBar').classList.remove('show'), 150);
});

function autoCalc() {
  const key = document.getElementById('customSelect').dataset.value || '';
  const precio = parseFloat(document.getElementById('precio').value);
  if (key) localStorage.setItem(LAST_KEY, key);
  if (key && !isNaN(precio) && precio > 0) calcular();
  else document.getElementById('resultados').innerHTML = '';
}

document.getElementById('cat').addEventListener('change', autoCalc);
document.getElementById('precio').addEventListener('input', autoCalc);
window.addEventListener('load', loadCatPreference);

function openBcModal(codes) {
  const parsed = typeof codes === 'string' ? JSON.parse(codes.replace(/&quot;/g,'"')) : codes;
  const container = document.getElementById('bcContent');
  container.innerHTML = parsed.map((item, i) =>
    `<div class="bc-section">
      <div class="bc-subtitle">${item.titulo}</div>
      <svg id="bcSvg${i}" class="bc-svg"></svg>
    </div>`
  ).join('');
  document.getElementById('bcBackdrop').classList.add('open');
  setTimeout(() => {
    parsed.forEach((item, i) => {
      JsBarcode(`#bcSvg${i}`, item.cod, { format:"EAN13", width:2, height:60, displayValue:true, fontSize:13, margin:5 });
    });
  }, 50);
}

function closeBcModal(e) {
  if (!e || e.target === document.getElementById('bcBackdrop')) {
    document.getElementById('bcBackdrop').classList.remove('open');
  }
}

function openDetalleModal(nombre, precio, eg, tasa, desc, total, c3, c6, c10, c12, c18) {
  const fmt = v => 'S/ ' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const pct = v => (v*100 % 1 === 0 ? (v*100).toFixed(0) : (v*100).toFixed(1)) + '%';
  document.getElementById('detallePlanName').textContent  = nombre;
  document.getElementById('detPrecio').textContent = fmt(precio);
  document.getElementById('detEg').textContent     = fmt(eg);
  document.getElementById('detTasa').textContent   = pct(tasa);
  document.getElementById('detallePlanTotal').textContent = 'Total: ' + fmt(total);
  const descRow = document.getElementById('detDescRow');
  if (desc > 0) { document.getElementById('detDesc').textContent = '− ' + fmt(desc); descRow.style.display = 'flex'; }
  else { descRow.style.display = 'none'; }
  document.getElementById('det3').textContent  = fmt(c3);
  document.getElementById('det6').textContent  = fmt(c6);
  document.getElementById('det10').textContent = fmt(c10);
  document.getElementById('det12').textContent = fmt(c12);
  document.getElementById('det18').textContent = fmt(c18);
  document.getElementById('detalleBackdrop').classList.add('open');
}

function closeDetalleModal(e) {
  if (!e || e.target === document.getElementById('detalleBackdrop'))
    document.getElementById('detalleBackdrop').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeBcModal({target: document.getElementById('bcBackdrop')});
    closeDetalleModal({target: document.getElementById('detalleBackdrop')});
  }
});
