<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extra EG | Planificación</title>
  
  <meta name="description" content="Gestión de planes Extra EG.">
  <meta name="theme-color" content="#e6007e">
  <link rel="manifest" href="manifest.json">

  <style>
    /* CSS Integrado */
    body { font-family: sans-serif; margin: 0; padding: 20px; line-height: 1.6; background-color: #f9f9f9; }
    header { background: #e6007e; color: white; padding: 1rem; text-align: center; border-radius: 8px; }
    main { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #666; }
    
    /* Estilos del Modal (tu lógica original) */
    .backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .backdrop.open { display: flex; }
    .modal { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>

  <header>
    <h1>Extra EG</h1>
  </header>

  <main>
    <section>
      <h2>Bienvenido</h2>
      <p>Aquí puedes visualizar y gestionar tus cálculos de planes.</p>
      </section>
  </main>

  <footer>
    <p>&copy; 2026 Extra EG</p>
  </footer>

  <div id="detalleBackdrop" class="backdrop" onclick="closeDetalleModal(event)">
    <div class="modal">
      <h3 id="detallePlanName">Detalle</h3>
      <div id="detDescRow" style="display:none;">Descuento: <span id="detDesc"></span></div>
      <p>Total: <span id="detallePlanTotal"></span></p>
      <button onclick="closeDetalleModal()">Cerrar</button>
    </div>
  </div>

  <script>
    /* JS Integrado */
    function fmt(v) {
      return 'S/ ' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    }

    function closeDetalleModal(e) {
      if (!e || e.target === document.getElementById('detalleBackdrop'))
        document.getElementById('detalleBackdrop').classList.remove('open');
    }

    // Aquí iría el resto de tu lógica original...
  </script>
</body>
</html>
